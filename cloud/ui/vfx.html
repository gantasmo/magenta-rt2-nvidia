<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<!--
  Audio-reactive visualizer for MRT2 Studio.
  Extracted from the "3d-vfx-morphing & integration-engine" project. VISUALIZER ONLY
  (GLSL post-effects + VFX-JS driver). No Gemini / AI-Studio code, no API keys.
  Audio is fed live from the parent page via postMessage {type:'AUDIO', low, mid, high, avg}.
  Preset chosen via ?preset=ghost|ferro|cymatic|pretzel.
-->
<style>
  html,body{margin:0;height:100%;background:#0c0d10;overflow:hidden;}
  #app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .orb{width:44vmin;height:44vmin;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #2b6fff 0%, #6a2bff 40%, #c34bff 68%, #0c0d10 100%);
    filter:blur(2px);opacity:.92;}
  .wm{position:absolute;font:700 6vmin system-ui,sans-serif;letter-spacing:.5vmin;color:#ffffff10;}
</style>
</head>
<body>
  <div id="app"><div class="orb"></div><div class="wm">MRT2</div></div>

  <script>
  // ============ Liquid Glass Ghost ============
  const SHADER_GHOST = `precision highp float;
uniform sampler2D src;
uniform vec2 resolution;
uniform vec2 offset;
uniform vec2 mouse;
uniform vec2 lag;
uniform float time;
uniform float clickTime;
uniform int clickCount;
uniform float uAudioFreq;
uniform float uAudioLow;
uniform float uAudioMid;
uniform float uAudioHigh;
out vec4 outColor;
const float SPHERE_R = 0.14;
const float DISP = 0.035;
const int DISP_STEPS = 10;
const float SCATTER = 0.025;
const float BUBBLE_SMOOTH = 0.035;
float smin(float a, float b, float k){float h=clamp(0.5+0.5*(b-a)/k,0.0,1.0);return mix(b,a,h)-k*h*(1.0-h);}
mat2 rot(float t){float c=cos(t),s=sin(t);return mat2(c,-s,s,c);}
vec2 hash22(vec2 p){vec3 p3=fract(vec3(p.xyx)*vec3(0.1031,0.1030,0.0973));p3+=dot(p3,p3.yzx+33.33);return fract((p3.xx+p3.yz)*p3.zy)*2.0-1.0;}
float sdSphere(vec3 p,float r){return length(p)-r;}
float sdGhostShape(vec3 q){
  vec3 p=q; p.y-=sin(time*2.5)*0.015; p.xz*=rot(time*0.4);
  float head=sdSphere(p-vec3(0.0,0.04,0.0),SPHERE_R);
  float bodyWidth=SPHERE_R*(1.0-(p.y-0.04)*0.3);
  float body=length(p.xz)-bodyWidth;
  float limitY=max(body,p.y+SPHERE_R-0.02); limitY=max(limitY,-p.y-0.15);
  float d=smin(head,limitY,0.025);
  float tentacleFreq=30.0+uAudioLow*15.0;
  float ripple=sin(p.x*tentacleFreq+time*8.0)*sin(p.z*tentacleFreq)*(0.012+uAudioLow*0.02);
  if(p.y<0.0){d+=ripple;}
  vec3 eyeL=p-vec3(-0.045,0.05,-SPHERE_R+0.015); float sEyeL=sdSphere(eyeL,0.018+uAudioHigh*0.01);
  vec3 eyeR=p-vec3(0.045,0.05,-SPHERE_R+0.015); float sEyeR=sdSphere(eyeR,0.018+uAudioHigh*0.01);
  d=max(d,-sEyeL); d=max(d,-sEyeR); return d;
}
float map(vec3 p,vec3 c){
  vec3 q=p-c; float tt=clickTime*5.0; float bounce=exp(-tt)*sin(tt)*4.0+(1.0-exp(-tt));
  float s=bounce*0.5+0.5; q/=s; float d=sdGhostShape(q);
  for(int i=0;i<4;i++){float fi=float(i);float angle=time*1.5+fi*1.57;
    float rBubble=0.025+sin(time+fi)*0.005+uAudioMid*0.02;
    vec3 bPos=vec3(cos(angle)*0.22,-0.05+sin(time*3.0+fi)*0.05,sin(angle)*0.22);
    float sB=sdSphere(q-bPos,rBubble); d=smin(d,sB,BUBBLE_SMOOTH);}
  return d*s;
}
vec3 calcNormal(vec3 p,vec3 c){vec2 e=vec2(0.001,0.0);return normalize(vec3(map(p+e.xyy,c)-map(p-e.xyy,c),map(p+e.yxy,c)-map(p-e.yxy,c),map(p+e.yyx,c)-map(p-e.yyx,c)));}
vec3 spectrum(float x){return clamp(vec3(1.6-abs(4.0*x-1.0),1.6-abs(4.0*x-2.0),1.6-abs(4.0*x-3.0)),0.0,1.0);}
vec4 getSrc(vec2 uv){vec4 col=texture(src,uv);return mix(vec4(1),col,col.a);}
void main(){
  vec2 uv=(gl_FragCoord.xy-offset)/resolution; float aspect=resolution.y/resolution.x;
  vec2 p=(uv-0.5)*vec2(1.0,aspect); vec2 mp=((mouse+lag)/resolution-0.5)*vec2(1.0,aspect);
  vec3 ro=vec3(0.0,0.0,-1.8); vec3 rd=normalize(vec3(p,2.0)); vec3 c=vec3(mp,0.0);
  vec3 firstN=vec3(0.0); vec3 lastN=vec3(0.0); int hitCount=0; float thickness=0.0; float tEntry=0.0; float t=0.0; bool inside=false;
  for(int i=0;i<40;i++){ if(t>8.0)break; vec3 pos=ro+rd*t; float d=map(pos,c); float step=inside?-d:d;
    if(step<4e-4){vec3 n=calcNormal(pos,c); if(hitCount==0)firstN=n; lastN=n; if(!inside){tEntry=t;}else{thickness+=t-tEntry;} hitCount++; if(hitCount>=4)break; inside=!inside; t+=0.012;} else {t+=step;} }
  if(hitCount>0){
    vec2 baseDisp=-(firstN.xy+lastN.xy)*0.5*DISP; float NdotR=max(dot(firstN,-rd),0.0); float scatter=pow((1.0-NdotR),2.0)*SCATTER;
    vec3 acc=vec3(0.0); vec3 wsum=vec3(0.0);
    for(int i=0;i<DISP_STEPS;i++){float wl=float(i)/float(DISP_STEPS-1);float k=mix(0.0,1.2,wl)*(1.3+float(hitCount)*0.15);vec2 h=hash22(uv*1000.0+float(i)*5.12+time)*scatter;vec3 w=spectrum(wl);acc+=getSrc(uv+baseDisp*k+h).rgb*w;wsum+=w;}
    vec3 col=acc/wsum*0.98; col-=float(hitCount)*0.04; col+=0.08;
    float fres=pow(1.0-NdotR,5.0); col*=1.0+fres*1.5;
    vec3 ABSORB=vec3(1.0,1.5,2.2)*2.5; col*=mix(vec3(1),exp(-ABSORB*thickness),1.0-pow(NdotR,3.0));
    vec3 ld=normalize(vec3(0.5,0.9,-0.3)); float spec=pow(max(dot(reflect(-ld,firstN),-rd),0.0),180.0); col+=spec*22.0;
    ld=normalize(vec3(-0.8,0.4,-0.3)); spec=pow(max(dot(reflect(-ld,firstN),-rd),0.0),220.0); col+=spec*4.0;
    col=min(col,1.0); col=1.0-abs(col+fres*0.3-1.0); outColor=vec4(col,1.0);
  } else { outColor=getSrc(uv); }
}`;

  // ============ Ferrofluid Acoustic Spike ============
  const SHADER_FERRO = `precision highp float;
uniform sampler2D src;
uniform vec2 resolution;
uniform vec2 offset;
uniform vec2 mouse;
uniform vec2 lag;
uniform float time;
uniform float uAudioFreq;
uniform float uAudioLow;
uniform float uAudioMid;
out vec4 outColor;
void main(){
  vec2 uv=(gl_FragCoord.xy-offset)/resolution; float aspect=resolution.y/resolution.x;
  vec2 p=(uv-0.5)*vec2(1.0,aspect); vec2 mp=(mouse/resolution-0.5)*vec2(1.0,aspect);
  vec3 ro=vec3(0.0,0.0,-1.5); vec3 rd=normalize(vec3(p,1.8)); vec3 center=vec3(mp,0.0);
  float t=0.0; bool hit=false; vec3 hp=vec3(0.0);
  for(int i=0;i<40;i++){ vec3 cp=ro+rd*t; vec3 q=cp-center;
    float sphereSDF=length(q)-0.14;
    float spikeNoise=sin(q.x*45.0+time*1.5)*cos(q.y*45.0+time*2.0)*sin(q.z*45.0);
    spikeNoise*=(0.015+uAudioLow*0.055);
    float dist=sphereSDF+spikeNoise;
    if(dist<0.001){hit=true;hp=cp;break;} t+=dist; if(t>5.0)break; }
  if(hit){
    vec2 e=vec2(0.001,0.0);
    vec3 n=normalize(vec3(
      (length(hp+e.xyy-center)-0.14)-(length(hp-e.xyy-center)-0.14),
      (length(hp+e.yxy-center)-0.14)-(length(hp-e.yxy-center)-0.14),
      (length(hp+e.yyx-center)-0.14)-(length(hp-e.yyx-center)-0.14)));
    vec3 light=normalize(vec3(0.5,1.0,-0.6)); float diff=max(dot(n,light),0.0);
    float spec=pow(max(dot(reflect(-light,n),-rd),0.0),32.0);
    vec3 fluidColor=vec3(0.06,0.06,0.08)+diff*0.1+spec*0.6;
    outColor=vec4(fluidColor,1.0);
  } else { outColor=texture(src,uv); }
}`;

  // ============ Cymatic Resonance Ring ============
  const SHADER_CYMATIC = `precision highp float;
uniform sampler2D src;
uniform vec2 resolution;
uniform vec2 offset;
uniform float time;
uniform float uAudioFreq;
uniform float uAudioMid;
out vec4 outColor;
void main(){
  vec2 uv=(gl_FragCoord.xy-offset)/resolution; vec2 p=uv-0.5;
  float r=length(p); float theta=atan(p.y,p.x);
  float wave=sin(r*40.0-time*6.0-uAudioMid*12.0);
  float starShape=sin(theta*8.0)*0.03*uAudioFreq;
  float dist=abs(r-0.15-wave*0.012-starShape);
  float val=smoothstep(0.01,0.0,dist);
  vec3 neonCyan=vec3(0.0,0.9,1.0); vec3 neonPurple=vec3(0.6,0.0,1.0);
  vec3 resultColor=mix(neonPurple,neonCyan,sin(time+r)*0.5+0.5)*val;
  vec4 baseTexture=texture(src,uv);
  outColor=mix(baseTexture,vec4(resultColor,1.0),val);
}`;

  // ============ Ferro Pretzel ============
  const SHADER_PRETZEL = `precision highp float;
uniform sampler2D src;
uniform vec2 resolution;
uniform vec2 offset;
uniform vec2 mouse;
uniform vec2 lag;
uniform float time;
uniform float uAudioFreq;
uniform float uAudioLow;
uniform float uAudioMid;
uniform float uAudioHigh;
out vec4 outColor;
const float SPHERE_R=0.15;
float smin(float a,float b,float k){float h=clamp(0.5+0.5*(b-a)/k,0.0,1.0);return mix(b,a,h)-k*h*(1.0-h);}
mat2 rot2(float t){float c=cos(t),s=sin(t);return mat2(c,-s,s,c);}
float sdPretzelShape(vec3 p){
  p.y-=sin(time*2.0)*0.01; p.xz*=rot2(time*0.5); p.yz*=rot2(time*0.2);
  vec3 pL=p-vec3(-0.05,0.0,0.0); float rL=length(pL.xz)-0.07; float ring1=length(vec2(rL,pL.y))-0.02;
  vec3 pR=p-vec3(0.05,0.0,0.0); float rR=length(pR.xz)-0.07; float ring2=length(vec2(rR,pR.y))-0.02;
  vec3 pC=p; float rC=length(pC.yz)-0.04; float ring3=length(vec2(rC,pC.x))-0.025;
  float combo1=smin(ring1,ring2,0.02); float d=smin(combo1,ring3,0.015);
  float spikeNoise=sin(p.x*50.0+time*4.0)*cos(p.y*50.0+time*3.0)*sin(p.z*50.0);
  d+=spikeNoise*(0.003+uAudioLow*0.025); return d;
}
float map(vec3 p,vec3 c){return sdPretzelShape(p-c);}
vec3 calcNormal(vec3 p,vec3 c){vec2 e=vec2(0.001,0.0);return normalize(vec3(map(p+e.xyy,c)-map(p-e.xyy,c),map(p+e.yxy,c)-map(p-e.yxy,c),map(p+e.yyx,c)-map(p-e.yyx,c)));}
void main(){
  vec2 uv=(gl_FragCoord.xy-offset)/resolution; float aspect=resolution.y/resolution.x;
  vec2 p=(uv-0.5)*vec2(1.0,aspect); vec2 mp=((mouse+lag)/resolution-0.5)*vec2(1.0,aspect);
  vec3 ro=vec3(0.0,0.0,-1.6); vec3 rd=normalize(vec3(p,2.0)); vec3 c=vec3(mp,0.0);
  float t=0.0; bool hit=false; vec3 hp=vec3(0.0);
  for(int i=0;i<45;i++){vec3 pos=ro+rd*t;float dist=map(pos,c);if(dist<0.0004){hit=true;hp=pos;break;}t+=dist;if(t>4.5)break;}
  if(hit){
    vec3 n=calcNormal(hp,c); vec3 ld=normalize(vec3(0.5,1.0,-0.5));
    float diff=max(dot(n,ld),0.0); float spec=pow(max(dot(reflect(-ld,n),-rd),0.0),150.0);
    vec3 baseColor=vec3(0.08,0.05,0.05); vec3 glowColor=vec3(1.0,0.3,0.0)*uAudioHigh*0.4;
    vec3 finalColor=baseColor+diff*vec3(0.1,0.08,0.1)+spec*0.8+glowColor;
    outColor=vec4(finalColor,1.0);
  } else { outColor=texture(src,uv); }
}`;

  const SHADERS = { ghost: SHADER_GHOST, ferro: SHADER_FERRO, cymatic: SHADER_CYMATIC, pretzel: SHADER_PRETZEL };
  const PRESET = new URLSearchParams(location.search).get("preset") || "ghost";
  window.postEffectShaderSource = SHADERS[PRESET] || SHADER_GHOST;
  </script>

  <script type="module">
  // Offline-first: local vendored VFX-JS, fall back to CDN if missing.
  let VFX;
  try { ({ VFX } = await import("./vendor/vfx-js.js")); }
  catch (e) { ({ VFX } = await import("https://esm.sh/@vfx-js/core@0.11.1")); }

  const app = document.getElementById("app");
  const PARAMS = { mouseSmoothing: 0.07, audioIntensity: 1.4 };
  const p0={x:0,y:0}, p1={x:0,y:0}, p2={x:0,y:0}; let hasMouse=false, centerBlend=1.0;
  let averageAmp=0, bassAmp=0, midAmp=0, trebleAmp=0, ext=null, extAt=0;

  window.addEventListener("message",(e)=>{
    const d=e.data||{};
    if(d.type==="AUDIO"){ ext={low:d.low||0,mid:d.mid||0,high:d.high||0,avg:d.avg||0}; extAt=performance.now(); }
    else if(d.type==="PARAMS_UPDATE"&&d.params) Object.assign(PARAMS,d.params);
  });
  window.addEventListener("pointermove",(e)=>{p0.x=e.clientX;p0.y=window.innerHeight-e.clientY;hasMouse=true;});
  let lastClickTime=performance.now()/1000, clickCount=0;
  window.addEventListener("pointerdown",()=>{lastClickTime=performance.now()/1000;clickCount++;});

  function tick(){
    const sm=PARAMS.mouseSmoothing;
    p1.x+=(p0.x-p1.x)*sm;p1.y+=(p0.y-p1.y)*sm;p2.x+=(p1.x-p2.x)*sm;p2.y+=(p1.y-p2.y)*sm;
    if(hasMouse)centerBlend*=0.94;
    const s=PARAMS.audioIntensity;
    if(ext&&performance.now()-extAt<400){averageAmp=ext.avg*s;bassAmp=ext.low*s;midAmp=ext.mid*s;trebleAmp=ext.high*s;}
    else{const tm=performance.now()/1000;averageAmp=0.12+Math.sin(tm*3.1)*0.05;bassAmp=0.15+Math.sin(tm*2.2)*0.08;midAmp=0.08+Math.sin(tm*4.3)*0.04;trebleAmp=0.05+Math.sin(tm*5.5)*0.03;}
    requestAnimationFrame(tick);
  }
  tick();

  const vfx=new VFX({postEffect:{shader:window.postEffectShaderSource, uniforms:{
    lag:()=>{const lx=(p1.x-p0.x)*devicePixelRatio,ly=(p1.y-p0.y)*devicePixelRatio;
      const cx=(window.innerWidth/2)*devicePixelRatio*centerBlend,cy=(window.innerHeight/2)*devicePixelRatio*centerBlend;return [cx+lx,cy+ly];},
    clickTime:()=>performance.now()/1000-lastClickTime, clickCount:()=>clickCount,
    uAudioFreq:()=>averageAmp, uAudioLow:()=>bassAmp, uAudioMid:()=>midAmp, uAudioHigh:()=>trebleAmp,
  }}});
  vfx.addHTML(app,{shader:"none"});
  vfx.play();
  </script>
</body>
</html>
