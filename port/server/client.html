<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MRT2 — NVIDIA stream</title>
<style>
  :root { --bg:#202124; --fg:#fff; --raised:#36373a; --muted:#9aa0a6; --accent:#1E70E6; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,'Segoe UI',sans-serif; background:var(--bg); color:var(--fg);
         display:flex; min-height:100vh; align-items:center; justify-content:center; }
  .card { width:min(680px,92vw); background:#0000; }
  h1 { font-size:20px; letter-spacing:1px; text-transform:uppercase; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:18px; }
  .row { display:flex; gap:10px; align-items:center; margin:10px 0; }
  input[type=text] { flex:1; background:var(--raised); border:1px solid #4444; color:var(--fg);
                     border-radius:6px; padding:10px 12px; font-size:14px; }
  button { background:var(--accent); color:#fff; border:0; border-radius:6px; padding:10px 16px;
           font-size:14px; font-weight:600; cursor:pointer; }
  button.ghost { background:var(--raised); }
  button:disabled { opacity:.4; cursor:default; }
  .grid { display:grid; grid-template-columns:140px 1fr 52px; gap:8px 12px; align-items:center;
          background:var(--raised); padding:14px 16px; border-radius:10px; margin-top:8px; }
  .grid label { font-size:13px; color:var(--muted); }
  input[type=range] { width:100%; }
  .val { font-variant-numeric:tabular-nums; font-size:13px; text-align:right; }
  .status { display:flex; gap:16px; margin-top:14px; font-size:13px; color:var(--muted);
            font-variant-numeric:tabular-nums; }
  .dot { width:9px; height:9px; border-radius:50%; background:#666; display:inline-block; margin-right:6px; }
  .dot.on { background:#34a853; } .dot.gen { background:#fbbc04; }
  .pill { background:var(--raised); border-radius:20px; padding:4px 10px; }
</style>
</head>
<body>
<div class="card">
  <h1>Magenta RealTime 2 <span style="color:var(--accent)">· NVIDIA stream</span></h1>
  <div class="sub">Live music from a GPU server. Same protocol for the JAX backend (today) and the native C++ engine (later).</div>

  <div class="row">
    <input id="url" type="text" value="ws://localhost:8765" />
    <button id="connect">Connect</button>
  </div>

  <div class="row">
    <input id="prompt" type="text" placeholder="describe the music… e.g. 'disco funk with a fat bassline'" value="warm analog pads" />
    <button id="send" class="ghost" disabled>Set prompt</button>
  </div>

  <div class="grid">
    <label>Temperature</label><input id="temperature" type="range" min="0.5" max="2" step="0.05" value="1.3"><div class="val" id="temperature_v">1.30</div>
    <label>Top-k</label><input id="top_k" type="range" min="1" max="256" step="1" value="40"><div class="val" id="top_k_v">40</div>
    <label>CFG style</label><input id="cfg_musiccoca" type="range" min="0" max="7" step="0.1" value="3.0"><div class="val" id="cfg_musiccoca_v">3.0</div>
    <label>CFG notes</label><input id="cfg_notes" type="range" min="0" max="7" step="0.1" value="1.0"><div class="val" id="cfg_notes_v">1.0</div>
  </div>

  <div class="row" style="margin-top:14px">
    <button id="start" disabled>▶ Start</button>
    <button id="stop" class="ghost" disabled>■ Stop</button>
    <div style="flex:1"></div>
    <div class="pill"><span id="dot" class="dot"></span><span id="state">disconnected</span></div>
  </div>

  <div class="status">
    <div>RTF: <b id="rtf">—</b></div>
    <div>buffer lead: <b id="lead">0.00</b>s</div>
    <div>chunk: <b id="chunk">—</b>s</div>
    <div id="msg"></div>
  </div>
</div>

<script>
let ws = null, ctx = null, gain = null, nextTime = 0, fmt = {sample_rate:48000, channels:2};
const $ = id => document.getElementById(id);
const setState = (s, cls) => { $("state").textContent = s; $("dot").className = "dot" + (cls?(" "+cls):""); };

function ensureAudio() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
    gain = ctx.createGain(); gain.gain.value = 0.9; gain.connect(ctx.destination);
    nextTime = 0;
  }
  if (ctx.state === "suspended") ctx.resume();
}

function playChunk(buf) {
  // buf: ArrayBuffer = 4-byte tag "AUD0" + Float32 interleaved stereo.
  const f32 = new Float32Array(buf, 4);
  const frames = f32.length / fmt.channels;
  const ab = ctx.createBufferSource();
  const audioBuf = ctx.createBuffer(fmt.channels, frames, fmt.sample_rate);
  for (let c = 0; c < fmt.channels; c++) {
    const ch = audioBuf.getChannelData(c);
    for (let i = 0; i < frames; i++) ch[i] = f32[i * fmt.channels + c];
  }
  ab.buffer = audioBuf; ab.connect(gain);
  const startAt = Math.max(ctx.currentTime + 0.12, nextTime);
  ab.start(startAt);
  nextTime = startAt + audioBuf.duration;
  $("lead").textContent = Math.max(0, nextTime - ctx.currentTime).toFixed(2);
}

function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

function connect() {
  if (ws) { ws.close(); ws = null; }
  ws = new WebSocket($("url").value.trim());
  ws.binaryType = "arraybuffer";
  setState("connecting…");
  ws.onopen = () => { setState("connected", "on"); for (const b of ["send","start","stop"]) $(b).disabled = false; };
  ws.onclose = () => { setState("disconnected"); for (const b of ["send","start","stop"]) $(b).disabled = true; };
  ws.onerror = () => setState("error");
  ws.onmessage = ev => {
    if (typeof ev.data !== "string") { if (ctx) playChunk(ev.data); return; }
    const m = JSON.parse(ev.data);
    if (m.type === "hello") {
      fmt.sample_rate = m.sample_rate; fmt.channels = m.channels;
      $("prompt").value = m.prompt ?? $("prompt").value;
      if (m.params) for (const k of ["temperature","top_k","cfg_musiccoca","cfg_notes"])
        if (m.params[k] != null) { $(k).value = m.params[k]; $(k+"_v").textContent = (+m.params[k]).toFixed(k==="top_k"?0:(k==="temperature"?2:1)); }
    } else if (m.type === "rtf") {
      $("rtf").textContent = m.value + "×"; $("chunk").textContent = m.chunk_s;
    } else if (m.type === "status") {
      if (m.state === "generating") setState("generating", "gen");
      else if (m.state === "stopped") setState("stopped", "on");
      $("msg").textContent = m.msg || "";
    }
  };
}

$("connect").onclick = connect;
$("send").onclick = () => send({ type: "prompt", text: $("prompt").value });
$("prompt").addEventListener("keydown", e => { if (e.key === "Enter") $("send").click(); });
$("start").onclick = () => { ensureAudio(); send({ type: "start" }); };
$("stop").onclick = () => send({ type: "stop" });

let pTimer = null;
for (const k of ["temperature","top_k","cfg_musiccoca","cfg_notes"]) {
  $(k).addEventListener("input", () => {
    $(k+"_v").textContent = (+$(k).value).toFixed(k==="top_k"?0:(k==="temperature"?2:1));
    clearTimeout(pTimer);
    pTimer = setTimeout(() => send({
      type: "params",
      temperature: +$("temperature").value, top_k: +$("top_k").value,
      cfg_musiccoca: +$("cfg_musiccoca").value, cfg_notes: +$("cfg_notes").value,
    }), 120);
  });
}
</script>
</body>
</html>
